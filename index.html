<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>تسجيل الدخول</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ff9046, #0000006c, #c7a17a);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
    }
    .login-box {
      background: #ff950017;
      color: #333;
      border-radius: 25px;
      border: 3px solid #b95600 ;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      width: 350px;
      padding: 40px;
      animation: fadeIn 1.2s ease;
    }
    .login-box h2 { text-align: center; margin-bottom: 25px; color: #6f4e37; font-size: 35px; }
    .login-box h3 { text-align: center; margin-bottom: 25px; color: #ab4b06; }
    .form-group { position: relative; margin-bottom: 25px; }
    .form-group input {
      width: 100%; padding: 14px 12px; border: 1px solid #000; border-radius: 20px;
      font-size: 14px; background: none; transition: border 0.3s ease;
    }
    .form-group label {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: #000; font-size: 14px; pointer-events: none; transition: 0.3s ease;
      background: none; padding: 0 4px;
    }
    .form-group input:focus { outline: none; border: 2px solid #883901; }
    .form-group input:focus + label,
    .form-group input:not(:placeholder-shown) + label {
      top: -13px; font-size: 15px; color: #883901;
    }
    button {
      width: 100%; padding: 12px; border: 2px solid #9f2000; border-radius: 20px;
      background: #6f4e37; color: #fff; font-size: 16px; cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
    }
    button:hover { background: #8d4a17; transform: translateY(-2px); }
    .message { text-align: center; margin-top: 15px; font-size: 14px; }
    .error { color: #d9534f; } .success { color: #5cb85c; }
    @keyframes fadeIn { from {opacity: 0; transform: translateY(20px);} to {opacity: 1; transform: translateY(0);} }
  </style>
</head>
<body oncontextmenu="return false;">
  <div class="login-box">
    <h2>مرحبا بك</h2>
    <h3>املأ معلومات تسجيل الدخول</h3>
    <form id="loginForm">
      <div class="form-group">
        <input type="email" id="username" placeholder=" " required>
        <label for="username">البريد الإلكتروني</label>
      </div>
      <div class="form-group">
        <input type="password" id="password" placeholder=" " required>
        <label for="password">كلمة المرور</label>
      </div>
      <button type="submit">تسجيل الدخول</button>
      <div id="message" class="message"></div>
    </form>
  </div>
