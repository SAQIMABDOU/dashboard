<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة القيادة - الصفحة الرئيسية</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <!-- ملف إعدادات Firebase -->
  <script src="firebase-config.js"></script>

  <!-- ✅ ستايل داخلي -->
  <style>
    body {
      margin: 0;
      font-family: "Tahoma", sans-serif;
      background-color: #6e25003c;
      color: #ffffff;
      text-align: center;
      border-radius: 35px;
      user-select: none; /* منع النسخ */
      -webkit-user-select: none;
      -ms-user-select: none;
    }

    header {
      background: linear-gradient(90deg, #87440d, #ac2e01);
      color: #fff;
      border-radius: 25px;
      padding: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      animation: fadeDown 1s ease;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: 1px;
    }

    header p {
      margin: 10px 0 0;
      font-size: 18px;
      opacity: 0.9;
    }

    main {
      padding: 60px 20px;
      animation: fadeUp 1s ease;
    }

    .menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
    }

    /* ✅ زر بصورة */
    .menu button {
      width: 800px;
      height: 800px;
      gap: 10px;
      margin-top: 20px;
      color: #ac2e01;
      font-size: 40px;
      border: 4px solid rgb(255, 72, 0);
      border-radius: 50px;
      cursor: pointer;
      overflow: hidden;
      background: none;
      padding: 90px;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .menu button img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50px;
      pointer-events: none; /* منع تحميل الصورة بالضغط المطول */
      -webkit-tap-highlight-color: transparent;
      outline: none;
      transition: transform 0.3s ease;
    }

    /* مؤثر الضغط */
    .menu button:active  {
      transform: scale(0.01);
      filter: brightness(0.9);
    }

    /* مؤثر التحويم */
    .menu button:hover  {
      transform: scale(1.01);
      box-shadow: 0 0px 25px rgba(255, 60, 0, 0.833);
    }

    /* Ripple Effect عصري */
    .menu button::after {
      content: "";
      position: absolute;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      width: 150px;
      height: 150px;
      transform: scale(0);
      opacity: 0;
      pointer-events: none;
    }

    .menu button:active::after {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      animation: ripple 0.6s ease-out;
    }

    @keyframes ripple {
      from {
        transform: translate(-50%, -50%) scale(0);
        opacity: 0.8;
      }
      to {
        transform: translate(-50%, -50%) scale(2.5);
        opacity: 0;
      }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <header>
    <h1>لوحة القيادة</h1>
    <p>اختر الإجراء المطلوب</p>
  </header>

  <main>
    <section class="menu">
      <!-- زر إضافة منتج بصورة -->
      <button onclick="location.href='dashboard.html'">
        <img src="assets/home-img/add.png" alt="إضافة منتج">إضافة منتج
      </button>

      <!-- زر قائمة الطلبات بصورة -->
      <button onclick="location.href='orders.html'">
        <img src="assets/home-img/order.png" alt="قائمة الطلبات">قائمة الطلبات
      </button>
    </section>
  </main>

  <script>
    // منع الرجوع إلى صفحة تسجيل الدخول
    history.pushState(null, null, location.href);
    window.onpopstate = function () {
      history.go(1);
    };

    // منع الضغط المطول والنسخ
    document.addEventListener("contextmenu", e => e.preventDefault());
    document.addEventListener("dragstart", e => e.preventDefault());
  </script>
</body>
</html>
